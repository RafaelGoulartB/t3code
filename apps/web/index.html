<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161616" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#161616" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script type="application/json" id="t3code-builtin-palettes">
      {
        "default": {
          "id": "default",
          "name": "Dark theme",
          "glyph": "Aa",
          "fontStyle": "serif",
          "dark": {
            "accent": "#cc7d5e",
            "background": "#2d2d2b",
            "foreground": "#f9f9f7"
          }
        }
      }
    </script>
    <script>
      (() => {
        const LIGHT_BACKGROUND = "#ffffff";
        const DARK_BACKGROUND = "#161616";
        const PALETTE_STORAGE_KEY = "t3code:theme-palette";
        const CUSTOM_PALETTES_STORAGE_KEY = "t3code:theme-palettes-custom";
        const DEFAULT_PALETTE_ID = "default";
        const HEX_COLOR_PATTERN = /^#[0-9a-f]{6}$/i;

        const parseHex = (raw) => {
          if (typeof raw !== "string") return null;
          const trimmed = raw.trim();
          return HEX_COLOR_PATTERN.test(trimmed) ? trimmed.toLowerCase() : null;
        };

        const readJsonScript = (id) => {
          const node = document.getElementById(id);
          if (!node) return null;
          try {
            return JSON.parse(node.textContent || "");
          } catch {
            return null;
          }
        };

        const builtinPalettes = readJsonScript("t3code-builtin-palettes") || {};

        const readCustomPalettes = () => {
          try {
            const raw = window.localStorage.getItem(CUSTOM_PALETTES_STORAGE_KEY);
            if (!raw) return {};
            const parsed = JSON.parse(raw);
            return parsed && typeof parsed === "object" ? parsed : {};
          } catch {
            return {};
          }
        };

        const resolvePaletteColors = (paletteId, resolvedTheme) => {
          const custom = readCustomPalettes();
          const palette =
            (paletteId && builtinPalettes[paletteId]) ||
            custom[paletteId] ||
            builtinPalettes[DEFAULT_PALETTE_ID];
          if (!palette) return null;
          if (resolvedTheme === "light" && palette.light) return palette.light;
          return palette.dark;
        };

        const paletteScript = document.getElementById("t3code-builtin-palettes");
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        try {
          const storedTheme = window.localStorage.getItem("t3code:theme");
          const theme =
            storedTheme === "light" || storedTheme === "dark" || storedTheme === "system"
              ? storedTheme
              : "system";
          const storedPaletteId = window.localStorage.getItem(PALETTE_STORAGE_KEY);
          const paletteId =
            storedPaletteId &&
            (builtinPalettes[storedPaletteId] || readCustomPalettes()[storedPaletteId])
              ? storedPaletteId
              : DEFAULT_PALETTE_ID;
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const isDark = theme === "dark" || (theme === "system" && prefersDark);
          document.documentElement.classList.toggle("dark", isDark);

          const paletteColors = resolvePaletteColors(paletteId, isDark ? "dark" : "light");
          if (paletteColors) {
            const accent = parseHex(paletteColors.accent);
            const background = parseHex(paletteColors.background);
            const foreground = parseHex(paletteColors.foreground);
            if (accent && background && foreground) {
              document.documentElement.style.setProperty("--theme-accent", accent);
              document.documentElement.style.setProperty("--background", background);
              document.documentElement.style.setProperty("--foreground", foreground);
              document.documentElement.style.setProperty("--app-chrome-background", background);
              const chromeColor = background;
              document.documentElement.style.backgroundColor = chromeColor;
              themeColorMeta?.setAttribute("content", chromeColor);
              paletteScript?.setAttribute("data-applied", "true");
            } else {
              const chromeColor = isDark ? DARK_BACKGROUND : LIGHT_BACKGROUND;
              document.documentElement.style.backgroundColor = chromeColor;
              themeColorMeta?.setAttribute("content", chromeColor);
            }
          } else {
            const chromeColor = isDark ? DARK_BACKGROUND : LIGHT_BACKGROUND;
            document.documentElement.style.backgroundColor = chromeColor;
            themeColorMeta?.setAttribute("content", chromeColor);
          }
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.backgroundColor = DARK_BACKGROUND;
          themeColorMeta?.setAttribute("content", DARK_BACKGROUND);
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #ffffff;
        color: #262626;
        font-family:
          "DM Sans Variable",
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      html.dark body {
        background: #161616;
        color: #f5f5f5;
      }

      #boot-shell {
        display: flex;
        min-height: 100%;
        align-items: center;
        justify-content: center;
        background: inherit;
      }

      #boot-shell-card {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
      }

      #boot-shell-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }
    </style>
    <title>T3 Code (Alpha)</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-shell">
        <div id="boot-shell-card" aria-label="T3 Code splash screen">
          <img id="boot-shell-logo" src="/apple-touch-icon.png" alt="T3 Code" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
